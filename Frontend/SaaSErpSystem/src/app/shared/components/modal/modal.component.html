<div class="fixed inset-0 z-[9999] flex items-center justify-center overflow-y-auto overflow-x-hidden bg-black/40 backdrop-blur-sm transition-opacity" 
     [ngClass]="isOpen() ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'">
  
  <div class="relative w-full p-4 transition-all duration-300"
       [ngClass]="{
         'scale-100 translate-y-0': isOpen(),
         'scale-95 translate-y-4': !isOpen(),
         'max-w-md': size() === 'sm',
         'max-w-2xl': size() === 'md',
         'max-w-4xl': size() === 'lg',
         'max-w-6xl': size() === 'xl'
       }"
       (click)="$event.stopPropagation()">
    
    <!-- Modal Content -->
    <div class="relative bg-white rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
      
      <!-- Header -->
      <div class="flex items-center justify-between p-6 border-b border-gray-100">
        <h3 class="text-xl font-bold text-[#1E3A5F]">
          {{ title() }}
        </h3>
        <button type="button" 
                (click)="close()"
                class="text-gray-400 bg-transparent hover:bg-gray-100 hover:text-gray-900 rounded-lg text-sm w-8 h-8 flex justify-center items-center transition-colors">
          <i class="pi pi-times"></i>
        </button>
      </div>

      <!-- Body -->
      <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
        <ng-content></ng-content>
      </div>

    </div>
  </div>
</div>
