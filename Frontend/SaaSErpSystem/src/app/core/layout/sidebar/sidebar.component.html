<aside 
  [class.w-64]="!ui.sidebarCollapsed()" 
  [class.w-16]="ui.sidebarCollapsed()"
  class="h-screen bg-white text-gray-600 transition-all duration-300 flex flex-col overflow-hidden shadow-sm border-l border-gray-100"
>
  <!-- Logo Section -->
  <div class="h-16 flex items-center px-4 border-b border-gray-100 shrink-0" [class.justify-between]="!ui.sidebarCollapsed()" [class.justify-center]="ui.sidebarCollapsed()">
    @if (!ui.sidebarCollapsed()) {
      <div class="flex items-center gap-3 overflow-hidden">
        <div class="w-9 h-9 bg-black rounded-xl flex items-center justify-center shrink-0 shadow-lg">
          <span class="font-black text-white text-xs">ERP</span>
        </div>
        <span class="font-bold text-lg tracking-tight text-gray-800 truncate">SaaS Shamel</span>
      </div>
    }
    
    <button 
      (click)="ui.toggleSidebar()"
      class="w-9 h-9 rounded-xl hover:bg-gray-50 text-gray-400 hover:text-black flex items-center justify-center transition-all shrink-0"
    >
      <i class="pi pi-bars text-lg"></i>
    </button>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 overflow-y-auto px-3 py-6 space-y-2 custom-scrollbar">
    @for (item of menuItems; track item.label) {
      <a 
        [routerLink]="item.route"
        routerLinkActive="bg-black text-white shadow-lg shadow-black/20"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-300 group hover:bg-gray-50 text-gray-500 hover:text-black"
        [title]="ui.sidebarCollapsed() ? item.label : ''"
      >
        <i [class]="item.icon" class="text-lg shrink-0 transition-transform group-hover:scale-110"></i>
        @if (!ui.sidebarCollapsed()) {
          <span class="text-sm font-bold truncate whitespace-nowrap">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- User Section (Optional Polish) -->
  <div class="p-4 border-t border-gray-100">
     <div class="flex items-center gap-3" [class.justify-center]="ui.sidebarCollapsed()">
        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400">
           <i class="pi pi-user text-xs"></i>
        </div>
        @if (!ui.sidebarCollapsed()) {
          <div class="overflow-hidden">
            <p class="text-xs font-bold text-gray-800 truncate">شاهر الياعري</p>
            <p class="text-[9px] text-gray-400 font-medium">مدير النظام</p>
          </div>
        }
     </div>
  </div>
</aside>
